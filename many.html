<html>
<head>
  <title>Meri Stylish Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
    }

    header {
      padding: 50px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 20px;
    }

    .btn {
      background: white;
      color: black;
      padding: 10px 20px;
      border: none;
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background: black;
      color: white;
    }

    img {
      width: 200px;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Welcome 👋</h1>
  <p>Ye meri stylish website hai 😎</p>

  <button class="btn" onclick="showMsg()">Click Me</button>

  <br>

  <img src="https://picsum.photos/200" alt="image">

</header>

<script>
function showMsg() {
  alert("Hello Dosto 🎉");
}
</script>

</body>
</html>
